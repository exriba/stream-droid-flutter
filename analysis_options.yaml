# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

linter:
  # The lint rules applied to this project can be customized in the
  # section below to disable rules from the `package:flutter_lints/flutter.yaml`
  # included above or to enable additional rules. A list of all available lints
  # and their documentation is published at https://dart.dev/lints.
  #
  # Instead of disabling a lint rule for the entire project in the
  # section below, it can also be suppressed for a single line of code
  # or a specific dart file by using the `// ignore: name_of_lint` and
  # `// ignore_for_file: name_of_lint` syntax on the line or in the file
  # producing the lint.
  rules:
    avoid_print: true # Prevent using print() in production code
    prefer_const_constructors: true # Use const constructors when possible for better performance
    prefer_const_literals_to_create_immutables: true # Make lists/maps const if used in const widgets
    prefer_const_declarations: true # Prefer const over final when values are compile-time constants
    prefer_final_fields: true # Encourage immutable class fields
    prefer_final_locals: true # Encourage local variables to be final when not reassigned
    always_declare_return_types: true # Forces functions to explicitly declare return types
    avoid_types_on_closure_parameters: true # Let Dart infer closure parameter types
    unnecessary_this: true # Removes unnecessary "this." references
    require_trailing_commas: true # Enforces trailing commas for better Flutter formatting
    sort_constructors_first: true # Constructors should appear before other class members
    use_key_in_widget_constructors: true # Ensures widgets accept a Key parameter
    avoid_unnecessary_containers: true # Avoid wrapping widgets with unnecessary Container widgets
    sort_child_properties_last: true # In widgets, place the "child" or "children" property last

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
