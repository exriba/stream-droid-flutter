name: Flutter CI

on:
  push:
    branches: [ "network/gRPC-jwt" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'

      - name: Restore Dependencies
        run: flutter pub get

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl
          PROTOC_ZIP=protoc-24.1-linux-x86_64.zip
          curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v24.1/$PROTOC_ZIP
          sudo unzip -o $PROTOC_ZIP -d /usr/local bin/protoc
          sudo unzip -o $PROTOC_ZIP -d /usr/local 'include/*'
          rm -f $PROTOC_ZIP

      - name: Activate protoc_plugin
        run: flutter pub global activate protoc_plugin

      - name: Add protoc-gen-dart to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Generate gRPC Protos
        run: |
          mkdir -p lib/src/generated
          # Generate all proto files recursively
          for f in $(find protos -name '*.proto'); do
            protoc --dart_out=grpc:lib/src/generated -Iprotos -I/usr/include "$f"
          done

      - name: Run Flutter Tests
        run: |
          flutter pub get
          mkdir -p test_results
          flutter test --machine > test_results/test_results.json

      - name: Convert JSON to JUnit
        run: |
          dart pub global activate junitreport
          dart pub global run junitreport:tojunit \
            -i test_results/test_results.json \
            -o test_results/test_results.xml

      - name: Upload JUnit Test Results
        uses: mikepenz/action-junit-report@v2
        with:
          path: test_results/test_results.xml