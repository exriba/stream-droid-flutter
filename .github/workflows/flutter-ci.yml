name: Flutter CI

on:
  push:
    branches: [ "network/gRPC-jwt" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'

      - name: Restore Dependencies
        run: flutter pub get

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl
          PROTOC_ZIP=protoc-24.1-linux-x86_64.zip
          curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v24.1/$PROTOC_ZIP
          sudo unzip -o $PROTOC_ZIP -d /usr/local bin/protoc
          sudo unzip -o $PROTOC_ZIP -d /usr/local 'include/*'
          rm -f $PROTOC_ZIP

      - name: Activate protoc_plugin
        run: flutter pub global activate protoc_plugin

      - name: Add protoc-gen-dart to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Generate gRPC Protos
        run: |
          mkdir -p lib/src/generated
          # Generate all proto files recursively
          for f in $(find protos -name '*.proto'); do
            protoc --dart_out=grpc:lib/src/generated -Iprotos -I/usr/include "$f"
          done

      - name: Install test_reporter
        run: |
          dart pub global activate test_reporter

      - name: Run Tests and Generate JUnit Report
        run: |
          # Ensure dependencies are installed
          flutter pub get

          # Create directory for test results
          mkdir -p test_results

          # Run Flutter tests in machine-readable format
          flutter test --machine > test_results/test-results.json

          # Convert machine-readable JSON to JUnit XML
          dart run test_reporter:report \
            --input=test_results/test-results.json \
            --output=test_results/test-results.xml \
            --reporter=junit

      - name: Upload JUnit Test Results
        uses: mikepenz/action-junit-report@v2
        with:
          path: test_results/test-results.xml